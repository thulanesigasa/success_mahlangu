<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>Our Love Story | A Journey of Love & Memories</title>
    <meta name="description"
        content="A beautiful love story told through moments, milestones, and treasured memories. Explore our journey together and securely store memories.">
    <meta name="keywords" content="Love Story, Memories, Our Journey, Romance, Timeline, Couple">
    <meta name="author" content="Forever Yours">
    <meta name="robots" content="index, follow">

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Our Love Story",
      "url": "https://success-mahlangu-birthday.com/",
      "description": "A beautiful love story told through moments, milestones, and treasured memories.",
      "publisher": {
        "@type": "Organization",
        "name": "Forever Yours"
      }
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Our Love Story | A Journey of Love & Memories">
    <meta property="og:description"
        content="A beautiful love story told through moments, milestones, and treasured memories.">
    <meta property="og:image" content="statics/preview.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Our Love Story | A Journey of Love & Memories">
    <meta property="twitter:description"
        content="A beautiful love story told through moments, milestones, and treasured memories.">

    <!-- Canonical -->
    <link rel="canonical" href="https://success-mahlangu-birthday.com/">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="statics/favicon.png">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Background -->
    <div class="bg-texture"></div>
    <div class="particles-container" id="particles"></div>

    <!-- Navigation & Breadcrumbs -->
    <nav class="navbar" id="navbar" aria-label="Main Navigation">
        <a href="#home" class="nav-logo">Our <span>Love</span> Story</a>
        <ul class="nav-links" id="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/story" class="active">Our Story</a></li>
            <li><a href="/memories">Memories</a></li>
            <li><a href="/auth/logout" class="nav-logout-btn"><i class="fa-solid fa-right-from-bracket"></i></a></li>
        </ul>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <main>
        <!-- Home section removed -->

        <!-- ═══ OUR STORY ═══ -->
        <section id="our-story" class="section our-story" aria-labelledby="story-heading">
            <div class="section-header reveal">
                <h2 id="story-heading">Our Story</h2>
                <p>The milestones that define our journey together, one beautiful moment at a time.</p>
                <div class="section-divider"></div>
            </div>

            <!-- Month Filter -->
            <div class="timeline-filter reveal">
                <div class="filter-select-wrapper">
                    <i class="fa-solid fa-calendar-days"></i>
                    <select id="month-filter" aria-label="Filter by month">
                        <option value="all">All Months</option>
                    </select>
                </div>
            </div>

            <div class="timeline" id="timeline">
                <!-- Timeline items injected by JS -->
            </div>
        </section>

        <!-- Memories section removed -->
    </main>

    <!-- FAB removed -->

    <!-- ═══ ADD MEMORY MODAL ═══ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2><i class="fa-solid fa-heart"></i> Add a Memory</h2>
            <form id="memory-form">
                <div class="form-group">
                    <label for="mem-title">Title</label>
                    <input type="text" id="mem-title" placeholder="e.g. Our First Date" required>
                </div>
                <div class="form-group">
                    <label for="mem-date">Date</label>
                    <input type="date" id="mem-date" required>
                </div>
                <div class="form-group">
                    <label for="mem-type">Type</label>
                    <select id="mem-type">
                        <option value="text">Text</option>
                        <option value="photo">Photo</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="mem-text">Description / Caption</label>
                    <textarea id="mem-text" placeholder="Write something from the heart..."></textarea>
                </div>
                <div class="form-group" id="file-group" style="display:none;">
                    <label>Upload File</label>
                    <div class="file-upload-area" id="file-upload-area">
                        <i class="fa-solid fa-cloud-arrow-up"
                            style="font-size:1.5rem;margin-bottom:0.5rem;display:block;"></i>
                        <span>Click or drag to upload</span>
                        <input type="file" id="mem-file" accept="image/*,video/*" style="display:none;">
                    </div>
                    <img class="file-preview" id="file-preview" style="display:none;" alt="Preview">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Memory</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <footer class="site-footer">
        <p class="footer-quote">"In all the world, there is no heart for me like yours."</p>
        <p class="footer-copy">Made with ♥ — Our Love Story</p>
    </footer>

    <!-- Scripts -->
    <script src="js/animation.js"></script>
</body>

</html>
